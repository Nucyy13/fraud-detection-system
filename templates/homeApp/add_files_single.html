 {% load static %} {% block title %}  {% endblock %} {% block css %}

 <link href="{% static 'css/add_files_single.css' %}" rel="stylesheet">

{% endblock %} {% block content %}
<main id="main">
  <!-- ======= Hero Section ======= -->
  <section id="homesection" style="padding: 0px 0px">
    <!--__________________________________ header-box______________________________________________ -->
    <div id="header-container">
      <h1 id="header2">ADD FILES</h1>
    </div>
    <!-- ___________________________________main-division____________________________________________ -->

    <div class="fraud-container" style="margin-bottom: 10px">
      <div class="fraud-header-container">
        <h3 class="fraud-header">UPLOAD CSV FILE WITH SINGLE RECORD</h3>
      </div>
      <div class="singlefilediv">
        <form
          class="upload-form"
          method="POST"
          action="{% url 'predict_csv_single' id %}"
          enctype="multipart/form-data"
        >
          {% csrf_token %}
          <label>Choose Single Recored CSV File</label><br />
          <input class="file" type="FILE" name="actual_file_name" /><br />
          <input class="btn" type="submit" name="" value="SUBMIT" />
        </form>
      </div>
    </div>
  </section>
  <!-- End Hero -->
</main>

{% endblock %}
