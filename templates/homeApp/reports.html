{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/reports.css' %}">
</head>

<body>

    <!-- ======= Hero Section ======= -->
    <section id="homesection">
        <div id="header-container">
            <h1 id="header2">List of Uploaded Files</h1>
        </div>
        <table id="example" class="table table-striped">
            <thead>
                <tr>
                    <th>Sr. No</th>
                    <th>File name</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for i in all_files %}
                <tr>
                  <td>{{forloop.counter}}</td>
                  <td>{{i.file_name}}</td>
                  <td>{{i.description |truncatechars:60}}</td>
                  <td>

                    <a href="{% url 'prediction_button' i.id %}"
                      ><button type="button" class="btn btn-success">
                        Prediction
                      </button></a
                    >

                    <a href="{% url 'analysis' i.id %}"
                      ><button type="button" class="btn btn-danger">Analysis</button></a
                    >
          
                    <a href="{% url 'delete_data' i.id %}"
                      ><button type="button" class="btn btn-secondary">
                        Delete
                      </button></a
                    >
                
                  </td>
                </tr>
        
                {% endfor %}
            </tbody>
        </table>
    </section>
    <!-- End Hero -->

</body>

</html>
