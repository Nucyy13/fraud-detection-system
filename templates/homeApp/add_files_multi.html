{% load static %}
{% block title %}
{% endblock %}

{% block css %}
<link href="{% static 'css/add_files_multi.css' %}" rel="stylesheet" />
{% endblock %}

{% block content %}
<main id="main">
    <!-- ======= Hero Section ======= -->
    <section id="homesection">
        <!-- Header -->
        <div id="header-container">
            <h1 id="header2">ADD FILES</h1>
        </div>

        <!-- Main content container -->
        <div class="fraud-container">
            <div class="fraud-header-container">
                <h3 class="fraud-header">UPLOAD CSV FILE WITH MULTIPLE RECORDS</h3>
            </div>
            <div class="singlefilediv">
                <!-- File upload form -->
                <form method="POST" action="{% url 'predict_csv_multi' id %}" class="upload-form" enctype="multipart/form-data">
                    {% csrf_token %}
                    <label for="file-input" class="file-label">Choose Multi-Record CSV File</label><br />
                    <input id="file-input" class="file-input" type="file" name="actual_file_name" />
                    <label for="file-input" class="file-button">Browse</label><br />
                    <input class="submit-btn" type="submit" value="SUBMIT" />
                </form>
            </div>
        </div>
    </section>
    <!-- End Hero -->
</main>
{% endblock %}
